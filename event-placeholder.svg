<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-gradient)"/>

  <!-- Calendar Icon -->
  <g transform="translate(150, 80)">
    <!-- Calendar body -->
    <rect x="10" y="20" width="80" height="80" rx="8" fill="white" opacity="0.9"/>

    <!-- Calendar header -->
    <rect x="10" y="20" width="80" height="20" rx="8" fill="white" opacity="1"/>

    <!-- Calendar rings -->
    <rect x="25" y="12" width="6" height="16" rx="3" fill="white"/>
    <rect x="69" y="12" width="6" height="16" rx="3" fill="white"/>

    <!-- Calendar date lines -->
    <rect x="20" y="50" width="60" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>
    <rect x="20" y="62" width="40" height="4" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="20" y="74" width="50" height="4" rx="2" fill="#3b82f6" opacity="0.4"/>
  </g>

  <!-- Text -->
  <text x="200" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">
    Imagine eveniment
  </text>
</svg>
